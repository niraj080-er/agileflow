spring.application.name=agileflow

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Server ---
server.port=${SERVER_PORT}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH}

# --- Logging ---
logging.level.root=${LOGGING_LEVEL_ROOT}
logging.level.com.swiggy=${LOGGING_LEVEL_COM_SWIGGY}

# --- OpenAPI / Swagger UI ---
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_ENABLED}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH}
springdoc.api-docs.path=/v3/api-docs
